<div style="font-family:-apple-system,Segoe UI,Arial,sans-serif;max-width:560px;margin:0 auto;border-radius:12px;overflow:hidden;border:1px solid #e5e7eb;">

  <!-- Header -->
  <div style="background:linear-gradient(135deg,#7c3aed,#8b5cf6);padding:28px 28px 22px;">
    <h2 style="color:#ffffff;font-size:20px;font-weight:800;margin:0 0 4px 0;">New Portfolio Message</h2>
    <p style="color:rgba(255,255,255,0.8);font-size:13px;margin:0;">Someone reached out via your portfolio contact form.</p>
  </div>

  <!-- Body -->
  <div style="padding:24px 28px;background:#fafafa;">

    <!-- Name + Email chips -->
    <table style="width:100%;border-collapse:collapse;margin-bottom:20px;">
      <tr>
        <td style="padding:10px 14px;background:#f0eaff;border:1px solid #ddd6fe;border-radius:6px 0 0 6px;width:50%;">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.07em;color:#7c3aed;font-weight:700;">From</div>
          <div style="font-size:14px;color:#1f2328;margin-top:3px;">{{name}}</div>
        </td>
        <td style="padding:10px 14px;background:#f0eaff;border:1px solid #ddd6fe;border-left:none;border-radius:0 6px 6px 0;width:50%;">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.07em;color:#7c3aed;font-weight:700;">Email</div>
          <div style="font-size:14px;color:#1f2328;margin-top:3px;">{{email}}</div>
        </td>
      </tr>
    </table>

    <!-- Message -->
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#57606a;margin-bottom:8px;">Message</div>
    <div style="background:#ffffff;border:1px solid #e5e7eb;border-radius:8px;padding:16px 18px;font-size:14px;color:#374151;line-height:1.7;white-space:pre-wrap;">{{message}}</div>

  </div>

  <!-- Footer -->
  <div style="padding:12px 28px;background:#f7f8fa;border-top:1px solid #e5e7eb;font-size:11px;color:#57606a;text-align:center;">
    Sent via Akash's Portfolio &nbsp;·&nbsp; Reply directly to this email to respond
  </div>

</div>
